<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenOil - Carte carburants</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./mobile-view.css" />
  </head>
  <body class="mobile-tab-filters">
    <header class="topbar">
      <div class="topbar-row">
        <h1>OpenOil</h1>
        <div style="display: flex; align-items: center; gap: 14px;">
          <button id="toggleMobileViewBtn" class="btn-toggle-mobile" type="button" data-i18n title="Basculer vers le mode téléphone">📱</button>
          <label class="lang-switch" for="languageSelect">
            <span data-i18n>Langue</span>
            <select id="languageSelect">
            <option value="fr">Français</option>
            <option value="en" selected>English</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
            <option value="nl">Nederlands</option>
            <option value="sv">Svenska</option>
            <option value="da">Dansk</option>
            <option value="no">Norsk</option>
            <option value="fi">Suomi</option>
            <option value="is">Íslenska</option>
            <option value="ga">Gaeilge</option>
            <option value="cy">Cymraeg</option>
            <option value="eu">Euskara</option>
            <option value="ca">Català</option>
            <option value="gl">Galego</option>
            <option value="sq">Shqip</option>
            <option value="bs">Bosanski</option>
            <option value="hr">Hrvatski</option>
            <option value="sr">Srpski</option>
            <option value="sl">Slovenščina</option>
            <option value="sk">Slovenčina</option>
            <option value="cs">Čeština</option>
            <option value="pl">Polski</option>
            <option value="hu">Magyar</option>
            <option value="ro">Română</option>
            <option value="bg">Български</option>
            <option value="el">Ελληνικά</option>
            <option value="mk">Македонски</option>
            <option value="uk">Українська</option>
            <option value="be">Беларуская</option>
            <option value="ru">Русский</option>
            <option value="et">Eesti</option>
            <option value="lv">Latviešu</option>
            <option value="lt">Lietuvių</option>
            <option value="mt">Malti</option>
            <option value="tr">Türkçe</option>
            <option value="az">Azərbaycanca</option>
            <option value="hy">Հայերեն</option>
            <option value="ka">ქართული</option>
          </select>
        </label>
        </div>
      </div>
      <div id="liveStatus" class="live-status" data-i18n>Connexion API en cours...</div>
      <div id="loadingProgress" class="loading-progress" aria-live="polite" hidden>
        <div class="loading-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="loadingProgressBar" class="loading-progress-bar"></div>
        </div>
        <div id="loadingProgressText" class="loading-progress-text">Recherche en cours...</div>
      </div>
    </header>

    <main class="layout">
      <aside class="panel">
        <section id="mobileLocationGate" class="mobile-location-gate" aria-live="polite">
          <h2>
            <span data-i18n>Trouver les prix autour de moi</span>
          </h2>
          <p class="mobile-location-gate-text" data-i18n>
            Sur téléphone, commence par ta localisation pour afficher directement la liste des prix près de toi.
          </p>
          <div class="mobile-location-gate-actions">
            <button id="mobileGateLocateBtn" class="btn" type="button" data-i18n>Utiliser ma localisation</button>
            <button id="mobileShowSearchBtn" class="btn secondary" type="button" data-i18n>Entrer une ville ou adresse</button>
          </div>
        </section>

        <section id="searchSection" class="filter-section">
          <h2>
            <button class="section-toggle" type="button" aria-expanded="true">
              <span data-i18n>Recherche</span>
              <span class="section-toggle-state" data-i18n>Masquer</span>
            </button>
          </h2>
          <div class="section-content">
          <div class="field">
            <label for="locationInput" data-i18n>Localisation (ville ou adresse)</label>
            <input id="locationInput" type="text" placeholder="Ex: Lyon Part-Dieu" data-i18n-placeholder />
          </div>
          <button id="searchLocationBtn" class="btn secondary" data-i18n>Rechercher cette localisation</button>
          <div class="field">
            <label for="fuelSelect" data-i18n>Carburant</label>
            <select id="fuelSelect">
              <option value="gazole">Gazole</option>
              <option value="sp95">SP95</option>
              <option value="sp98">SP98</option>
              <option value="e10">E10</option>
              <option value="e85">E85</option>
              <option value="gpl">GPL</option>
            </select>
          </div>
          <div class="field">
            <label for="viewModeSelect" data-i18n>Mode d'affichage</label>
            <select id="viewModeSelect">
              <option value="radius" data-i18n>Périmètre (10-50 km)</option>
              <option value="free" data-i18n>Mode libre (toutes les stations)</option>
            </select>
          </div>
          <div class="field inline">
            <input id="onlyAvailable" type="checkbox" checked />
            <label for="onlyAvailable" data-i18n>Afficher uniquement disponibles</label>
          </div>
          <div class="field">
            <label for="priceMax" data-i18n>Prix max (€ / L)</label>
            <input id="priceMax" type="number" min="0" step="0.001" placeholder="2.000" />
          </div>
          <button id="locateBtn" class="btn" data-i18n>Me localiser</button>
          <button id="refreshBtn" class="btn secondary" data-i18n>Rafraîchir maintenant</button>
          </div>
        </section>

        <section id="comparisonSection" class="filter-section">
          <h2>
            <button class="section-toggle" type="button" aria-expanded="true">
              <span data-i18n>Comparaison de prix</span>
              <span class="section-toggle-state" data-i18n>Masquer</span>
            </button>
          </h2>
          <div class="section-content">
          <div class="radii" id="radii"></div>
          <div class="field field-radius-custom">
            <label for="customRadiusInput" data-i18n>Rayon personnalisé (km)</label>
            <div class="inline-row">
              <input id="customRadiusInput" type="number" min="1" step="1" placeholder="Ex: 65" data-i18n-placeholder />
              <button id="applyRadiusBtn" class="btn secondary small" data-i18n>Appliquer</button>
            </div>
          </div>
          <div id="comparisonResult" class="result"></div>
          </div>
        </section>

        <section id="stationsSection" class="filter-section">
          <h2>
            <button class="section-toggle" type="button" aria-expanded="true">
              <span data-i18n>Stations affichées</span>
              <span class="section-toggle-state" data-i18n>Masquer</span>
            </button>
          </h2>
          <div class="section-content">
          <div class="station-list-toolbar">
            <div id="stationListCount" class="station-list-count" data-i18n>0 station</div>
            <label class="station-list-sort" for="mobileSortSelect">
              <span data-i18n>Trier</span>
              <select id="mobileSortSelect">
                <option value="price" data-i18n>Prix croissant</option>
                <option value="distance" data-i18n>Distance</option>
                <option value="deal" data-i18n>Compromis prix + distance</option>
              </select>
            </label>
          </div>
          <div id="stationListResult" class="station-list"></div>
          </div>
        </section>

      </aside>

      <div class="mobile-tabs" role="tablist" aria-label="Navigation mobile">
        <button id="mobileTabFiltersBtn" class="mobile-tab-btn active" type="button" role="tab" aria-selected="true" data-tab="filters" data-i18n>
          Filtres
        </button>
        <button id="mobileTabListBtn" class="mobile-tab-btn" type="button" role="tab" aria-selected="false" data-tab="list" data-i18n>
          Liste prix
        </button>
        <button id="mobileTabMapBtn" class="mobile-tab-btn" type="button" role="tab" aria-selected="false" data-tab="map" data-i18n>
          Carte
        </button>
      </div>

      <section class="map-wrap">
        <div id="map"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      (function () {
        // Translation providers: MyMemory (primary) + Google endpoint (fallback)
        const API = "https://api.mymemory.translated.net/get";
        const GOOGLE_API = "https://translate.googleapis.com/translate_a/single";
        const cache = {};
        const inflight = {};
        const LANG_KEY = "lang";
        const LANG_SESSION_OVERRIDE_KEY = "lang_session_override";

        async function translateViaGoogle(text, target) {
          const source = String(text || "").trim();
          const url = `${GOOGLE_API}?client=gtx&sl=fr&tl=${encodeURIComponent(target)}&dt=t&q=${encodeURIComponent(source)}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error(`GOOGLE HTTP ${res.status}`);
          const data = await res.json();
          const translated = Array.isArray(data?.[0])
            ? data[0].map((row) => (Array.isArray(row) ? row[0] : "")).join("")
            : "";
          return translated || source;
        }

        async function translateOne(text, target) {
          const source = String(text || "").trim();
          if (!source || target === "fr") return source;

          if (!cache[target]) cache[target] = {};
          if (!inflight[target]) inflight[target] = {};

          if (source in cache[target]) return cache[target][source];
          if (source in inflight[target]) return inflight[target][source];

          try {
            const request = (async () => {
              const url = `${API}?q=${encodeURIComponent(source)}&langpair=fr|${target}`;
              try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const warning = String(data?.responseDetails || "").toLowerCase();
                const mmText = String(data?.responseData?.translatedText || "");
                const quotaHit = warning.includes("used all available free translations") || mmText.includes("MYMEMORY WARNING");
                if (quotaHit) {
                  throw new Error("MYMEMORY_QUOTA");
                }

                const t = mmText || source;
                cache[target][source] = t;
                return t;
              } catch (_mmError) {
                const fallback = await translateViaGoogle(source, target);
                cache[target][source] = fallback;
                return fallback;
              }
            })();

            inflight[target][source] = request;
            const t = await request;
            delete inflight[target][source];
            return t;
          } catch (err) {
            console.warn("MyMemory error:", err);
            delete inflight[target][source];
            cache[target][source] = source;
            return source;
          }
        }

        window.openOilTranslateText = async function (text) {
          const sel = document.getElementById("languageSelect");
          const currentLang = sel?.value || localStorage.getItem(LANG_KEY) || "fr";
          return translateOne(text, currentLang);
        };

        async function translatePage(lang) {
          const els = Array.from(document.querySelectorAll("[data-i18n]"));
          const pEls = Array.from(document.querySelectorAll("[data-i18n-placeholder]"));

          // Save originals on first run
          els.forEach((el) => {
            if (!el.dataset.i18nOrig) el.dataset.i18nOrig = el.textContent.trim();
          });
          pEls.forEach((el) => {
            if (!el.dataset.i18nOrig) el.dataset.i18nOrig = el.placeholder;
          });

          if (lang === "fr") {
            els.forEach((el) => { el.textContent = el.dataset.i18nOrig; });
            pEls.forEach((el) => { el.placeholder = el.dataset.i18nOrig; });
            document.documentElement.lang = "fr";
            localStorage.setItem(LANG_KEY, "fr");
            return;
          }

          // Translate all strings in parallel
          const [tTexts, tPlaces] = await Promise.all([
            Promise.all(els.map((el) => translateOne(el.dataset.i18nOrig, lang))),
            Promise.all(pEls.map((el) => translateOne(el.dataset.i18nOrig, lang))),
          ]);

          els.forEach((el, i) => { el.textContent = tTexts[i]; });
          pEls.forEach((el, i) => { el.placeholder = tPlaces[i]; });
          document.documentElement.lang = lang;
          localStorage.setItem(LANG_KEY, lang);
        }

        window.openOilRetranslate = function () {
          const sel = document.getElementById("languageSelect");
          if (!sel || sel.value === "fr") {
            return;
          }
          translatePage(sel.value);
        };

        function detectBrowserLanguage(selectEl) {
          const available = new Set(
            Array.from(selectEl.options)
              .map((option) => String(option.value || "").trim().toLowerCase())
              .filter(Boolean)
          );

          const browserCandidates = [
            ...(Array.isArray(navigator.languages) ? navigator.languages : []),
            navigator.language,
            navigator.userLanguage,
          ]
            .filter(Boolean)
            .map((value) => String(value).toLowerCase().trim());

          for (const lang of browserCandidates) {
            const normalized = lang.replace("_", "-");
            if (available.has(normalized)) {
              return normalized;
            }

            const base = normalized.split("-")[0];
            if (available.has(base)) {
              return base;
            }
          }

          return "en";
        }

        function init() {
          const sel = document.getElementById("languageSelect");
          if (!sel) return;

          const sessionLang = sessionStorage.getItem(LANG_SESSION_OVERRIDE_KEY);
          const hasValidSessionLang =
            sessionLang && Array.from(sel.options).some((option) => option.value === sessionLang);

          if (hasValidSessionLang) {
            sel.value = sessionLang;
            translatePage(sessionLang);
          } else {
            const browserLang = detectBrowserLanguage(sel);
            sel.value = browserLang;
            translatePage(browserLang);
          }

          sel.addEventListener("change", () => {
            sessionStorage.setItem(LANG_SESSION_OVERRIDE_KEY, sel.value);
            translatePage(sel.value);
          });
        }

        document.addEventListener("DOMContentLoaded", init);
      })();
    </script>
    <script src="../app.js" type="module"></script>
  </body>
</html>
