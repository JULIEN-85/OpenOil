<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenOil - Carte carburants</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>OpenOil</h1>
      <p>Carte des stations, disponibilité carburants et comparaison de prix</p>
      <div id="liveStatus" class="live-status">Connexion API en cours...</div>
    </header>

    <main class="layout">
      <aside class="panel">
        <section>
          <h2>Recherche</h2>
          <div class="field">
            <label for="locationInput">Localisation (ville ou adresse)</label>
            <input id="locationInput" type="text" placeholder="Ex: Lyon Part-Dieu" />
          </div>
          <button id="searchLocationBtn" class="btn secondary">Rechercher cette localisation</button>
          <div class="field">
            <label for="fuelSelect">Carburant</label>
            <select id="fuelSelect">
              <option value="gazole">Gazole</option>
              <option value="sp95">SP95</option>
              <option value="sp98">SP98</option>
              <option value="e10">E10</option>
              <option value="e85">E85</option>
              <option value="gpl">GPL</option>
            </select>
          </div>
          <div class="field inline">
            <input id="onlyAvailable" type="checkbox" checked />
            <label for="onlyAvailable">Afficher uniquement disponibles</label>
          </div>
          <div class="field field-2cols">
            <div>
              <label for="priceMin">Prix min (€ / L)</label>
              <input id="priceMin" type="number" min="0" step="0.001" placeholder="1.600" />
            </div>
            <div>
              <label for="priceMax">Prix max (€ / L)</label>
              <input id="priceMax" type="number" min="0" step="0.001" placeholder="2.000" />
            </div>
          </div>
          <button id="locateBtn" class="btn">Me localiser</button>
          <button id="refreshBtn" class="btn secondary">Rafraîchir maintenant</button>
        </section>

        <section>
          <h2>Comparaison de prix</h2>
          <div class="radii" id="radii"></div>
          <div class="field field-radius-custom">
            <label for="customRadiusInput">Rayon personnalisé (km)</label>
            <div class="inline-row">
              <input id="customRadiusInput" type="number" min="1" step="1" placeholder="Ex: 65" />
              <button id="applyRadiusBtn" class="btn secondary small">Appliquer</button>
            </div>
          </div>
          <div id="comparisonResult" class="result"></div>
        </section>

        <section>
          <h2>Stations affichées</h2>
          <div id="stationListResult" class="station-list"></div>
        </section>

      </aside>

      <section class="map-wrap">
        <div id="map"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
